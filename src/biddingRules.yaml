# https://hackmd.io/@Utaha1228/BJPNT8O2be — NS = us; opp strain ( ); P / X / XX; optional (P) stripped when matching.
# Slots: M m oM om; X Y Z distinct suits; ? any strain; NT (bare N = typo). ASCII SHDC only in rules.
# RKCB / carding / Lebensohl detail: see HackMD (not covered as full-auction keys here).

rules:

  # --- Opening ---
  - format: template
    patterns:
      - "1m"
    meaning: "12-21 HCP, 3+ bid suit"

  - format: template
    patterns:
      - "1M"
    meaning: "12-21 HCP, 5+ bid suit"

  # --- Weak two / three ---
  - format: template
    patterns:
      - "2M-3M"
      - "2m-3m"
    meaning: "Signoff; raise on total tricks (LTT)."

  - format: template
    patterns:
      - "2M-4M"
      - "2m-4m"
    meaning: "Signoff preempt raise."

  - format: explicit
    patterns:
      - "2D-2NT"
      - "2H-2NT"
      - "2S-2NT"
    meaning: "Ogust over weak two (15+ HCP)."

  - format: explicit
    patterns:
      - "2C-2H"
      - "2C-2S"
      - "2C-3C"
      - "2C-3D"
    meaning: "8+ HCP, 5+ in suit (not waiting 2D)."

  - format: explicit
    patterns:
      - "2C-2NT"
    meaning: "8+ HCP balanced (prefer 2D waiting first)."

  # --- Misc relays (two new suits, then NT) ---
  - format: template
    patterns:
      - "1X-1Y-1NT-2C"
    meaning: "Relay to 2D: weak diamonds or invitational."

  - format: template
    patterns:
      - "1X-1Y-1NT-2D"
    meaning: "Game force; awkward for 3NT."

  - format: template
    patterns:
      - "P-1M-2m"
    meaning: "2-way Drury (inv): 2C = 3-card fit, 2D = 4-card fit."

  # --- 1 major: support ---
  - format: template
    patterns:
      - "1M-P"
    meaning: "0–5 HCP (pass with <6)."

  - format: template
    patterns:
      - "1M-2M"
    meaning: "8–9 HCP, 3+ trumps."

  - format: template
    patterns:
      - "1M-2NT"
    meaning: "Jacoby 2NT (GF+), no splinter planned."

  - format: template
    patterns:
      - "1M-3M"
    meaning: "Preemptive raise."

  - format: template
    patterns:
      - "1M-1NT-2M-P"
    meaning: "Opener 6–7 HCP, 3 trumps (via 1NT then 2M)."

  - format: template
    patterns:
      - "1M-1NT-2X-2M"
    meaning: "6–7 HCP, 3 trumps (new suit then 2M)."

  - format: template
    patterns:
      - "1M-1NT-2M-3M"
      - "1M-1NT-2X-3M"
    meaning: "10–11 HCP, 3 trumps."

  # --- 1 major: no fit ---
  - format: explicit
    patterns:
      - "1H-1S"
    meaning: "4+ spades."

  - format: template
    patterns:
      - "1M-1NT"
    meaning: "6–11 HCP, forcing (except later 1M-1NT-2X-4M slam try)."

  - format: explicit
    patterns:
      - "1S-2H"
    meaning: "5+ hearts."

  - format: template
    patterns:
      - "1M-2m"
    meaning: "GF; shows minor preference."

  - format: template
    patterns:
      - "1M-3X"
    meaning: "6+ cards, invitational new suit."

  # --- 1 major: opener after 1NT response ---
  - format: template
    patterns:
      - "1M-1NT-2X"
    meaning: "12–17 HCP, 4+ unless 5332."

  - format: explicit
    patterns:
      - "1H-1NT-2S"
    meaning: "Reverse: 16+ HCP, unbalanced."

  - format: template
    patterns:
      - "1M-1NT-2M"
    meaning: "12–14 HCP, 6+ major."

  - format: template
    patterns:
      - "1M-1NT-2NT"
    meaning: "18–19 HCP, 5332."

  - format: template
    patterns:
      - "1M-1NT-3M"
    meaning: "15–17 HCP, 6+ major."

  - format: template
    patterns:
      - "1M-1NT-3m"
    meaning: "18+ GF, 6+ major or 5–4+ unbalanced."

  - format: template
    patterns:
      - "1M-1NT-3NT"
    meaning: "To play (gambling-ish)."

  # --- 1 minor opening responses ---
  - format: template
    patterns:
      - "1m-1H"
    meaning: "4+ hearts."

  - format: template
    patterns:
      - "1m-1S"
    meaning: "4+ spades."

  - format: template
    patterns:
      - "1m-2m"
    meaning: "11+ HCP, 4+ support."

  - format: template
    patterns:
      - "1m-3m"
    meaning: "0–6 HCP, 5+ support, preemptive."

  - format: template
    patterns:
      - "1m-1NT"
    meaning: "6–9 HCP."

  - format: template
    patterns:
      - "1m-2NT"
    meaning: "10+ HCP, invite 3NT."

  # --- 1NT opening responses ---
  - format: explicit
    patterns:
      - "1NT-2C"
    meaning: "Stayman (8+ or garbage)."

  - format: explicit
    patterns:
      - "1NT-2D"
      - "1NT-2H"
    meaning: "Transfers (D→H, H→S); super-accept 17 with 4+ fit."

  - format: explicit
    patterns:
      - "1NT-2S"
    meaning: "Balanced invite or club transfer (2NT decline, 3C accept)."

  - format: explicit
    patterns:
      - "1NT-2NT"
    meaning: "Transfer to diamonds."

  - format: explicit
    patterns:
      - "1NT-3C"
    meaning: "5–5 minors, weak."

  - format: explicit
    patterns:
      - "1NT-3D"
    meaning: "5–5 minors, GF."

  - format: explicit
    patterns:
      - "1NT-3H"
    meaning: "31(54) GF."

  - format: explicit
    patterns:
      - "1NT-3S"
    meaning: "13(54) GF."

  - format: explicit
    patterns:
      - "1NT-3NT"
    meaning: "10–13 HCP balanced."

  - format: explicit
    patterns:
      - "1NT-4D"
      - "1NT-4H"
    meaning: "Texas (6+ major, no slam try); Jacoby xfer if slam interest."

  - format: explicit
    patterns:
      - "1NT-4NT"
    meaning: "15–17 HCP, invite 6NT."

  - format: explicit
    patterns:
      - "1NT-5NT"
    meaning: "20–21 HCP, invite 7NT."

  - format: explicit
    patterns:
      - "1NT-6NT"
    meaning: "18–19 HCP."

  # --- 2C strong ---
  - format: explicit
    patterns:
      - "2C-2D"
    meaning: "Waiting (2/1)."

  # --- Overcall / balancing ---
  - format: explicit
    patterns:
      - "(1C)-2C"
      - "(1D)-2D"
      - "(1H)-2H"
      - "(1S)-2S"
    meaning: "Michaels: 5–5 majors or major + minor."

  - format: explicit
    patterns:
      - "(1C)-2NT"
      - "(1D)-2NT"
      - "(1H)-2NT"
      - "(1S)-2NT"
    meaning: "Unusual 2NT: 5–5 in two lowest unbid suits."

  - format: explicit
    patterns:
      - "(1NT)-2C"
    meaning: "Landy: 5–4+ majors."

  - format: explicit
    patterns:
      - "(1NT)-X"
    meaning: "15+ HCP, penalty."

  - format: explicit
    patterns:
      - "(2D)-X"
      - "(2H)-X"
      - "(2S)-X"
    meaning: "Takeout 14+ (Lebensohl on)."

  - format: explicit
    patterns:
      - "(1C)-X"
      - "(1D)-X"
      - "(1H)-X"
      - "(1S)-X"
    meaning: "Takeout 12+ HCP."

  # --- After their overcall (advancer) ---
  - format: template
    patterns:
      - "1m-(1H)-X"
    meaning: "Negative: 6+ HCP, 4 spades."

  - format: template
    patterns:
      - "1m-(1S)-X"
    meaning: "Negative: 8+ HCP, 4+ hearts."

  - format: explicit
    patterns:
      - "1H-(1S)-X"
    meaning: "Negative: 8+ HCP, both minors, no heart fit."

  - format: explicit
    patterns:
      - "1C-(1D)-X"
    meaning: "Negative: 6+ HCP, both majors."

  - format: template
    patterns:
      - "1X-(1Y)-2X"
    meaning: "Weak raise in opener’s suit: ≤9 HCP, 3+ (4+ if minor opened)."

  - format: template
    patterns:
      - "1X-(1Y)-2Y"
    meaning: "10–11 HCP; cue their suit (fit / limit raise)."

  - format: template
    patterns:
      - "1X-(1Y)-3X"
    meaning: "Preemptive jump in opener’s suit (weaker than 2X)."

  - format: template
    patterns:
      - "1X-(1Y)-2Z"
    meaning: "10+ HCP, 5+ suit, forcing."

  - format: template
    patterns:
      - "1X-(1Y)-1Z"
    meaning: "Natural 6+ (1m-(1H)-1S = 5+ spades)."

  - format: template
    patterns:
      - "1X-(1Y)-1NT"
    meaning: "6–10 HCP, stopper."

  - format: template
    patterns:
      - "1X-(1Y)-2NT"
    meaning: "Balanced invite."

  - format: template
    patterns:
      - "1X-(1Y)-3NT"
    meaning: "Balanced game force."

  - format: template
    patterns:
      - "1X-(1Y)-X"
    meaning: "Negative double: 6+ (8+ if reply forces 2-level major)."

  # --- Doubles / redoubles ---
  - format: explicit
    patterns:
      - "1C-(X)-XX"
      - "1D-(X)-XX"
      - "1H-(X)-XX"
      - "1S-(X)-XX"
    meaning: "10+ HCP after takeout double; else ~9−."
